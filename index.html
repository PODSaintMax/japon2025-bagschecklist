<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
<style>
:root{--ink:#1a1208;--cream:#f7f3ed;--red:#c8372d;--gold:#c49a2e;--muted:#7a6e63;--border:#ddd5c8;--tokyo:#2d5a8e;--hakone:#3a7d44;--kyoto:#7b3f6e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Noto Serif',serif;font-size:15px;line-height:1.6;padding-bottom:3rem}
.hdr{background:var(--ink);color:var(--cream);padding:2rem 1.25rem 1.25rem;text-align:center}
.hdr .kanji{font-size:.85rem;opacity:.35;letter-spacing:.3em;margin-bottom:.5rem}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:.3rem}
.hdr .sub{font-size:.78rem;color:var(--gold);letter-spacing:.06em}
nav{display:flex;overflow-x:auto;background:var(--ink);scrollbar-width:none;position:sticky;top:0;z-index:50;border-top:1px solid rgba(255,255,255,.08)}
nav::-webkit-scrollbar{display:none}
nav button{flex:0 0 auto;padding:.7rem .9rem;color:rgba(255,255,255,.5);font-size:.7rem;letter-spacing:.04em;cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;transition:all .2s}
nav button.on{color:#fff}
nav button.on.tokyo{border-bottom-color:var(--tokyo)}
nav button.on.hakone{border-bottom-color:var(--hakone)}
nav button.on.kyoto{border-bottom-color:var(--kyoto)}
nav button.on.red{border-bottom-color:var(--red)}
.prog-wrap{max-width:760px;margin:0 auto;padding:.8rem 1.25rem 0}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:.35rem}
.prog-fill{height:100%;width:0;transition:width .3s}
.prog-txt{font-size:.72rem;color:var(--muted);text-align:center;padding-bottom:.5rem}
main{max-width:760px;margin:0 auto;padding:.5rem 1.25rem}
.bag{display:none}.bag.on{display:block}
.bag-intro{font-size:.82rem;color:var(--muted);font-style:italic;padding:.5rem 0 1rem;line-height:1.5}
.section{margin-bottom:1.2rem;border:1px solid var(--border);border-radius:.5rem;overflow:hidden;background:#fff}
.sec-h{padding:.6rem 1rem;font-family:'Playfair Display',serif;font-size:.92rem;color:#fff}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.55rem 1rem;border-bottom:1px solid #f0ebe3;cursor:pointer;transition:background .12s}
.item:last-child{border-bottom:none}
.item:hover{background:#faf7f1}
.item .box{flex:0 0 20px;height:20px;border:2px solid var(--border);border-radius:5px;margin-top:1px;position:relative;transition:all .15s}
.item.done .box{background:var(--hakone);border-color:var(--hakone)}
.item.done .box::after{content:'✓';position:absolute;top:-3px;left:2px;color:#fff;font-size:14px;font-weight:700}
.item .txt{flex:1}
.item .i-main{font-size:.88rem;line-height:1.3;transition:all .15s}
.item.done .i-main{text-decoration:line-through;color:var(--muted)}
.item .i-detail{font-size:.74rem;color:var(--muted);margin-top:.1rem}
footer{text-align:center;padding:1.5rem 1rem;font-size:.72rem;color:var(--muted)}
.reset{display:inline-block;margin-top:.5rem;padding:.4rem .9rem;border:1px solid var(--border);border-radius:.4rem;background:#fff;color:var(--muted);font-family:inherit;font-size:.72rem;cursor:pointer}
.reset:hover{border-color:var(--red);color:var(--red)}

/* --- SAUVEGARDE / SYNCHRO --- */
.sync{max-width:760px;margin:.8rem auto 0;padding:0 1.25rem}
.btn{font-family:inherit;font-size:.74rem;font-weight:600;border-radius:.45rem;padding:.5rem .8rem;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--ink);transition:all .15s}
.btn:hover{border-color:var(--ink)}
.btn-primary{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.saved-note{font-size:.68rem;color:var(--muted);margin-top:.45rem;font-style:italic;min-height:.9rem;line-height:1.4}
</style>

const LS_KEY = 'bagages_japon_2025';
let ref = null;

/* Persistance locale + synchro cloud */
function saveCache(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(Object.keys(state).filter(k=>state[k]).reduce((o,k)=>({...o,[k]:true}),{}))); }catch(e){}
}
function loadCache(){
  try{ const s=localStorage.getItem(LS_KEY); if(s) Object.assign(state, JSON.parse(s)); }catch(e){}
}
function showStatus(kind){
  const n=document.getElementById('savedNote'); if(!n) return;
  const t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(!ref){
    n.style.color='var(--red)';
    n.textContent="⚠️ Synchro cloud non disponible — les cases restent sur cet appareil uniquement.";
    return;
  }
  n.style.color='var(--muted)';
  if(kind==='connecting') n.textContent="☁️ Connexion à la synchro…";
  else if(kind==='error')  n.textContent="⚠️ Cloud injoignable — les cases restent gardées localement.";
  else                     n.textContent="☁️ Synchronisé entre tes appareils · maj "+t;
}

loadCache();

// Init Firebase
if(typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    ref = firebase.database().ref(LS_KEY);
    showStatus('connecting');
    ref.on('value', snap=>{
      const remote = snap.val() || {};
      state = {};
      Object.keys(remote).forEach(k=>{ if(remote[k]) state[k]=true; });
      saveCache();
      render();
      showStatus('cloud');
    }, ()=> showStatus('error'));
  }catch(e){ ref=null; showStatus(); }
} else {
  showStatus();
}

const state = {};
let current = 0;
const nav = document.getElementById('nav');
const main = document.getElementById('main');

bags.forEach((bag,bi)=>{
  const btn = document.createElement('button');
  btn.className = bag.cls+(bi===0?' on':'');
  btn.textContent = bag.name;
  btn.onclick = ()=>{ current=bi; render(); };
  nav.appendChild(btn);
});

function render(){
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('on',i===current));
  const bag = bags[current];
  main.innerHTML = `<div class="bag-intro">${bag.intro}</div>`;
  bag.sections.forEach((sec,si)=>{
    const s = document.createElement('div');
    s.className = 'section';
    s.innerHTML = `<div class="sec-h" style="background:${bag.color}">${sec.title}</div>`;
    sec.items.forEach((it,ii)=>{
      const id = `b${current}_s${si}_i${ii}`;
      const item = document.createElement('div');
      item.className = 'item'+(state[id]?' done':'');
      item.innerHTML = `<div class="box"></div><div class="txt"><div class="i-main">${it[0]}</div>${it[1]?`<div class="i-detail">${it[1]}</div>`:''}</div>`;
      item.onclick = ()=>{ 
        state[id]=!state[id]; 
        item.classList.toggle('done'); 
        saveCache();
        if(ref){ try{ ref.child(id).set(state[id] ? true : null); }catch(e){} }
        update(); 
        showStatus('cloud');
      };
      s.appendChild(item);
    });
    main.appendChild(s);
  });
  update();
}

function update(){
  let total=0,done=0;
  bags.forEach((bag,bi)=>bag.sections.forEach((sec,si)=>sec.items.forEach((it,ii)=>{
    total++; if(state[`b${bi}_s${si}_i${ii}`])done++;
  })));
  const pct = total?Math.round(done/total*100):0;
  const pf = document.getElementById('pf');
  pf.style.width = pct+'%';
  pf.style.background = bags[current].color;
  document.getElementById('pt').textContent = `${done} / ${total} articles préparés · ${pct}%`;
}

function resetAll(){ 
  const msg = ref ? 'Réinitialiser toutes les cases sur TOUS tes appareils synchronisés ?' : 'Réinitialiser toutes les cases ?';
  if(confirm(msg)){ 
    Object.keys(state).forEach(k=>delete state[k]); 
    saveCache();
    if(ref){ try{ ref.set(null); }catch(e){} }
    render(); 
    showStatus();
  } 
}

document.getElementById('btnSave').onclick=()=>{
  saveCache();
  if(ref){ try{ ref.set(Object.keys(state).filter(k=>state[k]).reduce((o,k)=>({...o,[k]:true}),{})); }catch(e){} }
  const b=document.getElementById('btnSave');
  b.textContent='✓ Sauvegardé';
  setTimeout(()=>b.textContent='💾 Sauvegarder',1600);
};

render();
</script>
